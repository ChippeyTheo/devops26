version: '3.8'

services:

  # Service API (4 réplicas)
  ping:
    build:
      context: .
      dockerfile: Dockerfile.multi
    deploy:
      replicas: 4
    networks:
      - app-network

  # Reverse-proxy nginx
  reverse-proxy:
    image: nginx:alpine
    ports:
      - "8080:80" 
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - ping
    networks:
      - app-network

# Réseau interne partagé
networks:
  app-network:
    driver: bridge